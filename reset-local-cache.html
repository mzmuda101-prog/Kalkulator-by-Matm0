<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset cache — Kalkulator Matm0</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }
        main {
            width: min(92vw, 420px);
            padding: 24px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.25rem;
        }
        p {
            margin: 0;
            color: #475569;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <h1>Czyszczenie lokalnego cache...</h1>
        <p>Za chwilę aplikacja otworzy się ponownie z plików serwera debugowego.</p>
    </main>
    <script>
        (function() {
            var tasks = [];

            if ('serviceWorker' in navigator) {
                tasks.push(
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        return Promise.all(registrations.map(function(reg) {
                            return reg.unregister();
                        }));
                    })
                );
            }

            if ('caches' in window) {
                tasks.push(
                    caches.keys().then(function(names) {
                        return Promise.all(names.map(function(name) {
                            return caches.delete(name);
                        }));
                    })
                );
            }

            Promise.all(tasks).catch(function(err) {
                console.warn('Cache reset failed:', err);
            }).then(function() {
                window.location.replace('./index.html?cache-reset=' + Date.now());
            });
        })();
    </script>
</body>
</html>
